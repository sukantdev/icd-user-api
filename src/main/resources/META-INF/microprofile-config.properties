icd_link_sterling_file_gw_desc= Go to Sterling My File Gateway
icd_link_reportq_epvcl_desc = View a general card-level listing of all your virtual cards under one or more customer IDs. Includes a summary tab showing card totals by status. Allows filtering by vendor name or number, creation date range, card amount, or card status. Use this report to view card statuses or other details at the card level. Available in Excel only.
icd_link_reportq_epocp_desc = View details of all virtual cards that are unprocessed or not fully processed by your vendors. Includes tabs for viewing outstanding cards by card status and expiration status. Card details include payment information, issue and expiration dates, vendor name and code, and variance between the card amount issued and the amount used. Available in Excel only.
icd_link_reportq_eprp_desc = ePayables Reconciliation Report
icd_link_reportq_epasp_desc = View a high-level overview of your program performance month-by-month. Provides graphic summaries of key program metrics including your month-by-month spending, spend per transaction, and top vendors. Also includes rebate information. Available as a PDF only.
icd_link_reportq_eptlp_desc = View transaction details for your virtual cards including merchant information and international processing details (e.g., conversion rates and cross-border fees). Useful for researching transactions shown as posted in the Virtual Card Listing. Includes merchant address information along with transaction details such as time, date, amount, and variance from full card value. Available in Excel only.
icd_link_reportq_epidp_desc = View payment details at the invoice level from the time your cards were requested via PS16, iConnectData, or web services. Useful for researching payments that have been aggregated into a single virtual card covering multiple invoices. Includes details on the vendor and invoices paid (including invoice number, date issued, due date, and payment date). Available in Excel only.
icd_link_reportq_eppbm_desc = Analytical reporting that allows a customer to compare their e-payables program performance to the performance of their Industry peers and RPMG study respondents.
icd_link_reportq_cd_desc = High-level, interactive view into your account\u2019s data. Use this report to share account performance with management, monitor spend, analyze patterns, and negotiate rates with vendors based on this information. View online, or export to PDF or Excel.
icd_link_reportq_asm_desc = High-level view into your account's monthly spend and transaction volume. Available in PDF only
icd_link_reportq_asa_desc = View your account's spend and transaction volume by day of the week. Use this report to monitor your account's spend for patterns and opportunities. Available in PDF only.
icd_link_reportq_agcf_desc = View transaction details by general ledger (GL) code, including merchant and GL information, total amount due, and card information. Available in PDF and Excel.
icd_link_reportq_pdf_desc = View transaction details by product purchased, including card information, product description and price, quantity purchased, total spend, and merchant name per transaction. Available in PDF and Excel.
icd_link_reportq_asf_desc = View transaction details by card, including card information, product description and price, quantity purchased, total spend, and merchant name per transaction. Available in PDF and Excel.
icd_link_reportq_csr_desc = View current record information for all cards associated with your account, including name on card, card/vehicle/employee ID number, spending profile and description, and last activity date. Available in PDF and Excel.
icd_link_reportq_cgs_desc = High-level view of spend by card, including card information and spend by merchant category code (MCC). Available in PDF and Excel.
icd_link_reportq_el_desc = View a list of transactions that trigger exception flags that have been set up on your account, including transaction detail. Available in PDF and Excel.
icd_link_reportq_glcl_desc = View transactions by general ledger (GL) codes that have been set up for your account. Includes transaction details and GL code numbers and descriptions. Available in PDF and Excel.
icd_link_reportq_idr_desc = View transaction-level detail by prompted ID and name. Includes transaction detail, prompted ID number was entered at time of purchase, and point-of-sale name associated with that prompted ID. Available in PDF and Excel.
icd_link_reportq_marc_desc = View card-level transaction data by merchant category code (MCC), including name on card, MCC identification number and description, and transaction count. Use this report to compare transaction volume across MCCs. Available in PDF only.
icd_link_reportq_msa_desc = High-level view of account spend and transaction volume by merchant category code (MCC). Use this report to compare spend and transaction volume across MCCs. Available in PDF only.
icd_link_reportq_msr_desc = View total spend and merchant details by merchant category code (MCC). Use this report to compare total spend across MCCs. Available in PDF and Excel.
icd_link_reportq_mtta_desc = View your top ten merchant category codes (MCC) with highest total spend and transaction volume. Use this report to analyze your account's activity within your top MCCs. Available in PDF only.
icd_link_reportq_aaf_desc = View air reservation purchase detail for your cardholders, including passenger name, ticket number, and total amount spent. Available in PDF and Excel.
icd_link_reportq_carg_desc = View transaction details by card, including card information, merchant information, spend per transaction, and description, price, and quantity of purchased product. Use this report to monitor cardholder spend. Available in PDF and Excel.
icd_link_reportq_cgse_desc = View spend and transaction volume by customer ID number, including percentages of total. Available in PDF and Excel.
icd_link_reportq_cst_desc = High-level view into spend and transaction volume by cardholder. Available in PDF only.
icd_link_reportq_csts_desc = High-level view into cardholder monthly spend and transaction volume, including overall spend and transaction volume range, and general ledger (GL) classifications, when applicable. Use this report to monitor your cardholders' spend. Available in PDF only.
icd_link_reportq_cs_desc = High-level view into spend by cardholder, transaction volume, and quantity of products purchased, including percentages of total. Available in PDF and Excel.
icd_link_reportq_csp_desc = High-level view into spend and transaction volume by cardholder, sorted by quarter. Use this report to monitor your cardholders' spend for patterns and opportunities. Available in PDF and Excel.
icd_link_reportq_ctts_desc = View your top ten cardholders with highest total spend and transaction volume, including percentages of total. Use this report to analyze your top cardholders' spend activity. Available in PDF and Excel.
icd_link_reportq_curg_desc = View transaction detail by cardholder, including card information, merchant information, spend per transaction, and description, price, and quantity of purchased product. Use this report to monitor cardholder usage. Available in PDF and Excel
icd_link_reportq_ps_desc = High-level view into spend and transaction volume by product purchased, including quantity purchased, spend per product, and hierarchy data. When available, this report will also include discount and rebate net cost_ Use this report to monitor spend per product for patterns. Available in PDF and Excel.
icd_link_reportq_tl_desc = View transaction details captured at time of purchase, grouped by card number, including card information, merchant information, spend per transaction, and description, price, and quantity of purchased product. Use this report to reconcile accounts or find missing transactions. Available in PDF and Excel.
icd_link_reportq_ctl_desc = View Canadian transaction details captured at time of purchase, grouped by card number, including card information, merchant information, spend per transaction, and description, price, and quantity of purchased product. Use this report to reconcile accounts or find missing transactions. Available in PDF and Excel.
icd_link_reportq_tsr_desc = View spend and transaction volume by preset spend range, including percentages of total. Available in PDF and Excel.
icd_link_reportq_etaal_desc = View all Express Cash transaction details, including invoice number, sender name, trip number, previous balance, and transaction fees. Available in PDF and Excel.
icd_link_reportq_etaco_desc = eCash  Transaction Activity - Company Only
icd_link_reportq_ectd_desc = Express Check Transaction Detail
icd_link_reportq_ecr_desc = Express Check Registration
icd_link_reportq_ecu_desc = Express Check Usage
icd_link_reportq_aff_desc = View fuel purchase detail by card and date of transaction, including card information, merchant information, spend per transaction, and description, price, and quantity of purchased product. Available in PDF and Excel.
icd_link_reportq_caf_desc = View transaction details by cardholder, including card information, merchant information, spend per transaction, and description, price, and quantity of purchased product. Available in PDF and Excel.
icd_link_reportq_cidr_desc = View cardholder ID information, including associated customer ID, and first and last name of cardholder. Available in PDF and Excel.
icd_link_reportq_fsr_desc = View transaction details by customer ID, including merchant and SmartBuy information, price per gallon (PPG) paid, potential SmartBuy discount amount, and difference between paid and potential discount. Use this report to view potential savings available to your fleet at SmartBuy locations. Available in PDF only.
icd_link_reportq_fmmr_desc = View spend by merchant, including merchant and merchant group details, and account, customer, and card information. Available in PDF and Excel.
icd_link_reportq_fpscid_desc = High-level view into fuel spend and transaction volume by customer ID, including percentages of total. Available in PDF and Excel.
icd_link_reportq_fpsp_desc = High-level view into fuel spend and transaction volume by cardholder prompted ID, including percentages of total. Available in PDF and Excel.
icd_link_reportq_fpspcid_desc = High-level view into fuel spend and transaction volume by cardholder prompted ID and customer ID, including percentages of total. Available in PDF and Excel.
icd_link_reportq_fpsv_desc = High-level view into fuel spend and transaction volume by vehicle or unit number, including percentages of total. Available in PDF and Excel.
icd_link_reportq_mpgr_desc = View mileage details per transaction by vehicle or unit number, including beginning and ending odometer readings, miles driven, miles per gallon (MPG), cost per mile (CPM), and transaction information. Available in PDF and Excel.
icd_link_reportq_titpd_desc = View transaction details by card, including card information, merchant information, fuel type, and any other data captured at the time of the transaction. Use this report to find missing transactions or reconcile your account. Available in PDF and Excel.
icd_link_reportq_titps_desc = View transaction details by date, including card information, merchant information, fuel type, and location of transaction,. Available in PDF and Excel.
icd_link_reportq_vl_desc = View vehicle numbers associated with each card on your account, including account and customer ID numbers, card information, and Misc1 and Misc2 data (when available). Available in PDF and Excel
icd_link_reportq_vr_desc = View transaction details by vehicle number, including card information, merchant information, spend per transaction, and description, price, and quantity of purchased product. Available in PDF and Excel.
icd_link_reportq_fcbdus_desc = Fuel Card Billing Detail US
icd_link_reportq_fcbdc_desc = Fuel Card Billing Detail Canada
icd_link_reportq_pdbr_desc = Pilot Direct Bill Report
icd_link_reportq_rfs_desc = Reefer Fuel by State
icd_link_reportq_mar_desc = View transaction and merchant details by account, including merchant information, acquirer and acceptor numbers, date of transaction, original price, and discount amount. Available in PDF and Excel.
icd_link_reportq_mda_desc = View transaction and merchant details by account, including merchant information, acquirer and acceptor numbers, date of transaction, original price, and discount amount. Available in PDF and Excel.
icd_link_reportq_mccds_desc = High-level view into spend and transaction volume by merchant category code (MCC), including percentages of total. Available in PDF and Excel.
icd_link_reportq_mfcs_desc = High-level view into spend by merchant chain, including merchant chain information, and average price per unit (PPU), gallons, and spend per merchant. Available in PDF and Excel.
icd_link_reportq_mla_desc = High-level view into spend and transaction volume by individual merchant location, including merchant information, and average price per unit (PPU), gallons, and spend per merchant. Available in PDF and Excel.
icd_link_reportq_mst_desc = High-level view into spend, quantity of product purchased, and transaction volume by account, including percentages of total. Available in PDF and Excel.
icd_link_reportq_ms_desc = High-level view into spend and transaction volume by merchant group, including percentages of total. Available in PDF and Excel.
icd_link_reportq_mtts_desc = High-level view into spend and transaction volume of top ten merchants, including percentages of total. Available in PDF and Excel.
icd_link_reportq_npt_desc = View merchant-based pricing data, including merchant location code, product code, rack city number, rack pricing details, supplier network, created and modified time stamp, and applicable tax rates. Available in PDF and Excel.
icd_link_reportq_npcr_desc = This report is designed for Loves and Pilot merchants only, and features merchant-based pricing data, including merchant location code, product code, rack city number, rack pricing details, supplier network, created and modified time stamp, and applicable tax rates. Available in PDF and Excel.
icd_link_reportq_ahf_desc = View hotel transaction details by cardholder, including card information, merchant information, arrival and departure date (total nights purchased), and room rates (when provided by merchant). Available in PDF and Excel.
icd_link_reportq_tecas_desc = View travel and entertainment transaction details by cardholder, including total spend and transaction volume, and spend and transaction volume by airline, hotel, rental car, and other. Available in PDF and Excel.
icd_link_reportq_tecaa_desc = View air reservation transaction details by cardholder, including card information, merchant information, carrier or service class code, departure and arrival location, and flight number. Available in PDF and Excel.
icd_link_reportq_techa_desc = View hotel transaction details by cardholder, including card information, merchant information, arrival and departure date (total nights purchased), and room rates (when available). Available in PDF and Excel.
icd_link_reportq_techr_desc = View car rental transaction details by cardholder, including card information, merchant information, arrival and departure date (total nights purchased), and room rates (when available). Available in PDF and Excel.
icd_link_reportq_vcl_desc = View details of all your account's issued virtual cards, including payment information, vendor invoice number or PO number, general ledger codes (when applicable), and issue and expiration date. Available in PDF and Excel.
icd_link_reportq_vcape_desc = View details of all virtual payment transactions, including payment information, vendor invoice number or PO number, general ledger codes (when applicable), and variance between dollar amount issued versus dollar amount used. Available in PDF and Excel.
icd_link_reportq_oac_desc = View details of all issued virtual cards that have been unclaimed by your vendors, including payment information, issue and expiration date, vendor name and code, and variance between dollar amount issued versus used. Available in PDF and Excel.
icd_link_reportq_vmcrrp_desc = View details of all virtual payment transactions by period, including payment information, issue and expiration date, vendor name and code, and variance between dollar amount issued versus dollar amount used. Use this report to reconcile accounts or find missing transactions. Available in PDF and Excel.
icd_link_reportq_etaaa_desc = eCash  Transaction Activity -  All Activity
icd_link_reportq_deftd_desc = View transaction detail for all diesel exhaust fuel (DEF) purchases made on your Comdata proprietary card, including fuel details and product 1, 2, or 3 details. Available in Excel only.
icd_link_reportq_cur_desc = View current record information for all cards, similar to Card Listing Report. Report summarized card usage from Current to Never Used and by Profile Description. The report includes graphs. Available only in Excel.
icd_link_reportq_pin_desc = View Card/Driver details based on last prompted ID used. The report shows Customer ID of the card and prompted ID. Available for Excel download only.



